<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goal Finder</title>
    <style>
      :root { --bg:#f4f1ea; --panel:#fffdf8; --border:#d9d1c3; --text:#1f1f1c; --muted:#666257; --green:#1b6b5c; --green-dark:#155347; --blue:#1f3b73; --blue-soft:#dbe4f8; --sand:#ece6d9; --red:#9d2b2b; --gold:#8b5b13; --shadow:0 18px 45px rgba(31,31,28,.08); }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; font-family:Georgia,"Times New Roman",serif; color:var(--text); background:radial-gradient(circle at top left, rgba(27,107,92,.15), transparent 28%), linear-gradient(180deg,#faf7f1 0%,var(--bg) 100%); }
      button, textarea { font:inherit; }
      .app { max-width:920px; margin:0 auto; padding:32px 18px 48px; }
      .eyebrow { display:inline-block; margin-bottom:10px; padding:6px 10px; border:1px solid rgba(27,107,92,.25); border-radius:999px; color:var(--green); font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
      h1 { margin:0 0 8px; font-size:clamp(2rem,4vw,3.3rem); line-height:1; }
      .subtitle { margin:0; max-width:700px; color:var(--muted); line-height:1.5; }
      .toggle { display:inline-flex; gap:6px; margin-top:18px; padding:6px; border-radius:999px; border:1px solid var(--border); background:rgba(255,253,248,.88); box-shadow:var(--shadow); }
      .tab { border:0; background:transparent; padding:10px 18px; border-radius:999px; color:var(--muted); cursor:pointer; }
      .tab.active { background:var(--green); color:#fff; }
      .panel { margin-top:24px; background:rgba(255,253,248,.92); border:1px solid var(--border); border-radius:28px; box-shadow:var(--shadow); backdrop-filter:blur(10px); }
      .top { display:flex; justify-content:space-between; gap:16px; align-items:center; padding:22px 24px; border-bottom:1px solid rgba(217,209,195,.8); }
      .top h2,.goal h2 { margin:0 0 4px; }
      .top p { margin:0; color:var(--muted); font-size:.95rem; }
      .pill { padding:8px 12px; border-radius:999px; font-size:.85rem; white-space:nowrap; border:1px solid transparent; }
      .open { color:#0d5f50; background:rgba(27,107,92,.1); border-color:rgba(27,107,92,.18); }
      .closed { color:#7f5a16; background:rgba(181,137,32,.12); border-color:rgba(181,137,32,.18); }
      .error { color:var(--red); background:rgba(157,43,43,.1); border-color:rgba(157,43,43,.18); }
      .messages { min-height:48vh; max-height:56vh; overflow-y:auto; padding:22px; display:flex; flex-direction:column; gap:14px; }
      .empty { margin:auto; max-width:520px; text-align:center; color:var(--muted); line-height:1.6; }
      .row { display:flex; }
      .row.user { justify-content:flex-end; }
      .row.ai { justify-content:flex-start; }
      .bubble { max-width:min(78%,620px); padding:14px 16px; border-radius:18px; white-space:pre-wrap; line-height:1.5; word-break:break-word; }
      .bubble.user { color:#fff; background:linear-gradient(180deg,#27498e 0%,var(--blue) 100%); border-bottom-right-radius:6px; }
      .bubble.ai { color:var(--text); background:var(--sand); border:1px solid rgba(31,31,28,.06); border-bottom-left-radius:6px; }
      .typing { display:flex; align-items:center; gap:10px; color:var(--muted); }
      .dots { display:inline-flex; gap:6px; }
      .dots span { width:8px; height:8px; border-radius:50%; background:var(--green); opacity:.25; animation:pulse 1.2s infinite ease-in-out; }
      .dots span:nth-child(2) { animation-delay:.2s; }
      .dots span:nth-child(3) { animation-delay:.4s; }
      @keyframes pulse { 0%,80%,100% { transform:scale(.9); opacity:.25; } 40% { transform:scale(1.05); opacity:1; } }
      @keyframes ring { 0% { transform:scale(.92); opacity:.5; } 100% { transform:scale(1.18); opacity:0; } }
      .composer { padding:18px 20px 20px; border-top:1px solid rgba(217,209,195,.8); background:rgba(255,252,245,.8); }
      .form { display:grid; grid-template-columns:1fr auto; gap:12px; }
      textarea { width:100%; min-height:56px; max-height:160px; resize:vertical; padding:14px 16px; border-radius:16px; border:1px solid #cfc5b3; background:#fff; color:var(--text); }
      textarea:focus { outline:2px solid rgba(27,107,92,.2); border-color:var(--green); }
      .btn,.retry,.restart,.voice-btn { border:0; cursor:pointer; padding:14px 18px; border-radius:16px; color:#fff; transition:transform 120ms ease, opacity 120ms ease; }
      .btn { min-width:120px; background:var(--green); align-self:end; }
      .voice-btn { display:block; min-width:220px; margin:0 auto; background:var(--green); }
      .voice-btn.stop { background:#8b2f2f; }
      .retry { background:var(--gold); }
      .restart { background:var(--green-dark); margin-top:12px; }
      .btn:hover,.retry:hover,.restart:hover,.voice-btn:hover { transform:translateY(-1px); }
      .btn:disabled,.retry:disabled,.restart:disabled,.voice-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
      .meta { display:flex; justify-content:space-between; gap:12px; margin-top:10px; color:var(--muted); font-size:.85rem; }
      .voice { padding:28px; }
      .voice-card { padding:20px; border-radius:20px; background:rgba(236,230,217,.4); border:1px solid rgba(217,209,195,.9); text-align:center; }
      .orb { width:132px; height:132px; margin:14px auto 24px; position:relative; display:grid; place-items:center; border-radius:50%; border:1px solid rgba(31,31,28,.08); background:rgba(236,230,217,.45); }
      .orb::before,.orb::after { content:""; position:absolute; inset:-10px; border-radius:50%; opacity:0; }
      .orb.listening { background:rgba(27,107,92,.16); }
      .orb.listening::before,.orb.listening::after { border:2px solid rgba(27,107,92,.35); animation:ring 1.8s infinite; }
      .orb.listening::after { animation-delay:.9s; }
      .orb.speaking { background:rgba(31,59,115,.14); }
      .orb.speaking::before,.orb.speaking::after { border:2px solid rgba(31,59,115,.32); animation:ring 1.6s infinite; }
      .orb.speaking::after { animation-delay:.8s; }
      .voice-card h3 { margin:0 0 8px; font-size:1.4rem; }
      .voice-card p { margin:0; color:var(--muted); line-height:1.6; }
      .box-error { margin:18px 0 0; padding:14px 16px; border-radius:16px; border:1px solid rgba(157,43,43,.18); background:rgba(157,43,43,.08); color:var(--red); }
      .goal { padding:28px; }
      .goal h2 { margin:0 0 10px; font-size:clamp(1.8rem,4vw,2.6rem); line-height:1.1; }
      .goal-copy { margin:0 0 26px; max-width:700px; color:var(--muted); line-height:1.6; }
      .goal-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-bottom:18px; }
      .field { padding:16px; border-radius:18px; background:rgba(236,230,217,.55); border:1px solid rgba(217,209,195,.9); }
      .wide { grid-column:1 / -1; }
      .label { margin-bottom:8px; color:var(--muted); font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; }
      .value { line-height:1.6; }
      @media (max-width:720px) {
        .app { padding:20px 14px 32px; }
        .top,.meta { flex-direction:column; align-items:flex-start; }
        .form { grid-template-columns:1fr; }
        .btn,.voice-btn,.retry { width:100%; }
        .bubble { max-width:90%; }
        .goal-grid { grid-template-columns:1fr; }
      }
      .chapter-card { padding:14px 16px; border-radius:16px; border:1px solid rgba(217,209,195,.9); margin-bottom:0; }
      .chapter-loading { background:rgba(236,230,217,.3); }
      .chapter-failed { background:rgba(157,43,43,.06); border-color:rgba(157,43,43,.2); }
      .chapter-ready { background:rgba(255,253,248,.8); }
      .chapter-title { font-weight:600; margin-bottom:4px; }
      @keyframes genPulse { 0%,100% { opacity:.45 } 50% { opacity:1 } }
      .gen-pulse { display:inline-block; color:var(--green); font-size:.85rem; animation:genPulse 1.4s infinite; }
      .concept-badge { padding:3px 10px; border-radius:999px; background:rgba(27,107,92,.1); border:1px solid rgba(27,107,92,.18); color:var(--green); font-size:.78rem; }
      .resource-btn { display:inline-block; padding:7px 12px; border-radius:10px; font-size:.82rem; text-decoration:none; border:1px solid transparent; cursor:default; }
      .yt-btn { background:rgba(220,50,50,.1); border-color:rgba(220,50,50,.2); color:#c0392b; cursor:pointer; }
      .art-btn { background:rgba(31,59,115,.1); border-color:rgba(31,59,115,.2); color:var(--blue); cursor:pointer; }
      .quiz-btn { background:rgba(139,91,19,.1); border-color:rgba(139,91,19,.2); color:var(--gold); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react">
      const TEXT_WS_URL = (userId) => `ws://localhost:8000/ws/text?user_id=${encodeURIComponent(userId)}`;
      const VOICE_WS_URL = (userId) => `ws://localhost:8000/ws/voice?user_id=${encodeURIComponent(userId)}`;
      const INPUT_RATE = 16000;
      const OUTPUT_RATE = 24000;
      const SEND_MS = 250;

      function makeId() {
        return window.crypto?.randomUUID ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function pcmBytesToFloat32(buffer) {
        const int16 = new Int16Array(buffer);
        const out = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i += 1) out[i] = int16[i] / 32768.0;
        return out;
      }

      function downsampleFloat32(input, inRate, outRate) {
        if (inRate === outRate) return input;
        const ratio = inRate / outRate;
        const newLength = Math.max(1, Math.round(input.length / ratio));
        const out = new Float32Array(newLength);
        let outOffset = 0;
        let inOffset = 0;
        while (outOffset < out.length) {
          const next = Math.min(input.length, Math.round((outOffset + 1) * ratio));
          let sum = 0;
          let count = 0;
          for (let i = inOffset; i < next; i += 1) { sum += input[i]; count += 1; }
          out[outOffset] = count ? sum / count : 0;
          outOffset += 1;
          inOffset = next;
        }
        return out;
      }

      function float32ToPcm16Bytes(buffer) {
        const out = new ArrayBuffer(buffer.length * 2);
        const view = new DataView(out);
        for (let i = 0; i < buffer.length; i += 1) {
          const sample = Math.max(-1, Math.min(1, buffer[i]));
          view.setInt16(i * 2, sample < 0 ? sample * 32768 : sample * 32767, true);
        }
        return out;
      }

      function UserIdScreen({ onConfirm }) {
        const [value, setValue] = React.useState("");
        const submit = (e) => {
          e.preventDefault();
          const id = value.trim();
          if (id) onConfirm(id);
        };
        return (
          <section className="panel" style={{ padding: 36, maxWidth: 480, margin: "60px auto" }}>
            <h2 style={{ marginTop: 0 }}>Welcome</h2>
            <p style={{ color: "var(--muted)", marginBottom: 24 }}>Enter your user ID to get started.</p>
            <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <input
                autoFocus
                value={value}
                onChange={(e) => setValue(e.target.value)}
                placeholder="e.g. alice or user-123"
                style={{ padding: "14px 16px", borderRadius: 16, border: "1px solid #cfc5b3", fontSize: "1rem", fontFamily: "inherit", color: "var(--text)", background: "#fff" }}
              />
              <button className="btn" type="submit" disabled={!value.trim()} style={{ alignSelf: "flex-end" }}>
                Continue
              </button>
            </form>
          </section>
        );
      }

      function ChapterCard({ chapter }) {
        if (chapter.status === "pending" || chapter.status === "generating") {
          return (
            <div className="chapter-card chapter-loading">
              <div className="chapter-title">{chapter.title}</div>
              <div style={{ marginTop: 6 }}>
                {chapter.status === "generating"
                  ? <span className="gen-pulse">Generating content…</span>
                  : <span style={{ color: "var(--muted)", fontSize: ".85rem" }}>Queued</span>}
              </div>
            </div>
          );
        }
        if (chapter.status === "failed") {
          return (
            <div className="chapter-card chapter-failed">
              <div className="chapter-title">{chapter.title}</div>
              <div style={{ color: "var(--red)", fontSize: ".85rem", marginTop: 4 }}>Content generation failed</div>
            </div>
          );
        }
        const c = chapter.content;
        return (
          <div className="chapter-card chapter-ready">
            <div className="chapter-title">{c.title}</div>
            {c.summary && <p style={{ margin: "8px 0 10px", color: "var(--muted)", lineHeight: 1.6, fontSize: ".9rem" }}>{c.summary}</p>}
            {c.key_concepts && c.key_concepts.length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
                {c.key_concepts.map((k, i) => <span key={i} className="concept-badge">{k}</span>)}
              </div>
            )}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 8 }}>
              {c.youtube && (
                <a href={c.youtube.url} target="_blank" rel="noopener noreferrer" className="resource-btn yt-btn">
                  ▶ {c.youtube.title ? c.youtube.title.slice(0, 42) + (c.youtube.title.length > 42 ? "…" : "") : "Watch Video"}
                </a>
              )}
              {c.article && (
                <a href={c.article.url} target="_blank" rel="noopener noreferrer" className="resource-btn art-btn">
                  ✦ {c.article.title ? c.article.title.slice(0, 42) + (c.article.title.length > 42 ? "…" : "") : "Read Article"}
                </a>
              )}
              {c.quiz && c.quiz.length > 0 && (
                <span className="resource-btn quiz-btn">✎ {c.quiz.length} Quiz Questions</span>
              )}
            </div>
          </div>
        );
      }

      function CourseView({ goal, roadmap, userId }) {
        const [courseModules, setCourseModules] = React.useState(() =>
          (roadmap.modules || []).map(mod => ({
            title: mod.title,
            chapters: (mod.chapters || []).map(ch => ({ title: ch.title, status: "pending", content: null })),
          }))
        );
        const [courseStatus, setCourseStatus] = React.useState("starting");
        const esRef = React.useRef(null);

        React.useEffect(() => {
          fetch("/api/v1/course/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ goal: goal.goal, roadmap, user_id: userId, expertise: "beginner" }),
          })
            .then(r => r.json())
            .then(({ course_id }) => {
              setCourseStatus("generating");
              const es = new EventSource(`/api/v1/course/${course_id}/stream`);
              esRef.current = es;
              es.addEventListener("chapter_ready", (e) => {
                const { module_idx, chapter_idx, content } = JSON.parse(e.data);
                setCourseModules(prev => {
                  const next = prev.map(m => ({ ...m, chapters: [...m.chapters] }));
                  next[module_idx].chapters[chapter_idx] = { ...next[module_idx].chapters[chapter_idx], status: "ready", content };
                  return next;
                });
              });
              es.addEventListener("chapter_failed", (e) => {
                const { module_idx, chapter_idx } = JSON.parse(e.data);
                setCourseModules(prev => {
                  const next = prev.map(m => ({ ...m, chapters: [...m.chapters] }));
                  next[module_idx].chapters[chapter_idx] = { ...next[module_idx].chapters[chapter_idx], status: "failed" };
                  return next;
                });
              });
              es.addEventListener("course_complete", () => { setCourseStatus("complete"); es.close(); });
              es.onerror = () => { setCourseStatus("error"); es.close(); };
            })
            .catch(() => setCourseStatus("error"));
          return () => { if (esRef.current) esRef.current.close(); };
        }, []);

        const total = courseModules.reduce((s, m) => s + m.chapters.length, 0);
        const done = courseModules.reduce((s, m) => s + m.chapters.filter(c => c.status === "ready" || c.status === "failed").length, 0);

        return (
          <section className="panel goal">
            <h2 style={{ marginBottom: 4 }}>{goal.goal}</h2>
            <p style={{ margin: "0 0 22px", color: "var(--muted)", fontSize: ".9rem" }}>
              {courseStatus === "starting" && "Preparing course generation…"}
              {courseStatus === "generating" && `Generating content… ${done} / ${total} chapters ready`}
              {courseStatus === "complete" && `✓ All ${total} chapters ready`}
              {courseStatus === "error" && "Course generation encountered an error"}
            </p>
            {courseModules.map((mod, i) => (
              <div key={i} style={{ marginBottom: 28 }}>
                <div className="label">Module {i + 1}</div>
                <div style={{ fontWeight: 600, fontSize: "1.05rem", margin: "6px 0 12px" }}>{mod.title}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {mod.chapters.map((ch, j) => <ChapterCard key={j} chapter={ch} />)}
                </div>
              </div>
            ))}
          </section>
        );
      }

      function TextMode({ onGoalComplete, userId }) {
        const [messages, setMessages] = React.useState([]);
        const [input, setInput] = React.useState("");
        const [loading, setLoading] = React.useState(false);
        const [status, setStatus] = React.useState("connecting");
        const [errorText, setErrorText] = React.useState("");
        const wsRef = React.useRef(null);
        const messagesRef = React.useRef(null);

        const connect = React.useCallback(() => {
          if (wsRef.current) wsRef.current.close();
          setStatus("connecting");
          setErrorText("");
          setLoading(false);
          const ws = new WebSocket(TEXT_WS_URL(userId));
          wsRef.current = ws;
          ws.onopen = () => setStatus("open");
          ws.onmessage = (event) => {
            setLoading(false);
            try {
              const payload = JSON.parse(event.data);
              if (payload.type === "message" && payload.text) {
                setMessages((m) => [...m, { id: makeId(), sender: "ai", text: payload.text }]);
                return;
              }
              if (payload.type === "goal_complete" && payload.goal) {
                onGoalComplete({ goal: payload.goal, roadmap: payload.roadmap });
                return;
              }
            } catch (error) {
            }
            setMessages((m) => [...m, { id: makeId(), sender: "ai", text: "Received an unexpected response from the server." }]);
          };
          ws.onerror = () => { setStatus("error"); setLoading(false); setErrorText("WebSocket connection failed. Make sure the FastAPI server is running on port 8000."); };
          ws.onclose = () => setStatus((s) => (s === "error" ? "error" : "closed"));
        }, [onGoalComplete]);

        React.useEffect(() => {
          connect();
          return () => wsRef.current?.close();
        }, [connect]);

        React.useEffect(() => {
          if (messagesRef.current) messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
        }, [messages, loading]);

        const send = (event) => {
          event.preventDefault();
          const text = input.trim();
          if (!text || loading) return;
          if (!wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) {
            setStatus("closed");
            setErrorText("The connection is not open. Refresh or switch modes after the backend is running.");
            return;
          }
          wsRef.current.send(JSON.stringify({ text }));
          setMessages((m) => [...m, { id: makeId(), sender: "user", text }]);
          setInput("");
          setLoading(true);
          setErrorText("");
        };

        const onKeyDown = (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            send(event);
          }
        };

        const pillClass = status === "open" ? "pill open" : status === "error" ? "pill error" : "pill closed";
        const pillText = status === "open" ? "Connected" : status === "connecting" ? "Connecting" : status === "error" ? "Connection Error" : "Disconnected";

        return (
          <section className="panel chat-panel">
            <div className="top">
              <div><h2>Text Conversation</h2><p>One question at a time. The chat ends when a structured goal is ready.</p></div>
              <div className={pillClass}>{pillText}</div>
            </div>
            <div className="messages" ref={messagesRef}>
              {!messages.length ? <div className="empty">Start with something broad like "I want to learn LLMs" or "I want to get better at system design."</div> : messages.map((message) => (
                <div key={message.id} className={`row ${message.sender}`}>
                  <div className={`bubble ${message.sender}`}>{message.text}</div>
                </div>
              ))}
              {loading ? (
                <div className="row ai"><div className="bubble ai"><div className="typing"><div className="dots"><span></span><span></span><span></span></div><span>Thinking</span></div></div></div>
              ) : null}
            </div>
            <div className="composer">
              <form className="form" onSubmit={send}>
                <textarea value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={onKeyDown} placeholder="Describe what you want to learn..." disabled={status !== "open" || loading} />
                <button className="btn" type="submit" disabled={status !== "open" || loading || !input.trim()}>{loading ? "Waiting..." : "Send"}</button>
              </form>
              <div className="meta">
                <span>Press Enter to send. Use Shift+Enter for a new line.</span>
                <span>{errorText || "Backend WebSocket: ws://localhost:8000/ws/text"}</span>
              </div>
            </div>
          </section>
        );
      }

      function VoiceMode({ onGoalComplete, userId }) {
        const [voiceState, setVoiceState] = React.useState("idle");
        const [errorText, setErrorText] = React.useState("");
        const [active, setActive] = React.useState(false);
        const [recording, setRecording] = React.useState(false);
        const wsRef = React.useRef(null);
        const activeRef = React.useRef(false);
        const recordingRef = React.useRef(false);
        const mediaRef = React.useRef(null);
        const inputCtxRef = React.useRef(null);
        const outputCtxRef = React.useRef(null);
        const workletRef = React.useRef(null);
        const processorRef = React.useRef(null);
        const sourceRef = React.useRef(null);
        const intervalRef = React.useRef(null);
        const inputChunksRef = React.useRef([]);
        const nextPlaybackRef = React.useRef(0);
        const stoppingRef = React.useRef(false);
        const sentChunkCountRef = React.useRef(0);
        const receivedAudioCountRef = React.useRef(0);

        const logVoice = React.useCallback((message, extra) => {
          if (extra === undefined) {
            console.log(`[voice-ui] ${message}`);
            return;
          }
          console.log(`[voice-ui] ${message}`, extra);
        }, []);

        React.useEffect(() => {
          activeRef.current = active;
        }, [active]);

        React.useEffect(() => {
          recordingRef.current = recording;
        }, [recording]);

        const cleanupPlayback = React.useCallback(async () => {
          logVoice("cleanup playback");
          nextPlaybackRef.current = 0;
          if (outputCtxRef.current) {
            try { await outputCtxRef.current.close(); } catch (error) {}
            outputCtxRef.current = null;
          }
        }, [logVoice]);

        const cleanupRecording = React.useCallback(async () => {
          logVoice("cleanup recording");
          if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; }
          if (workletRef.current) { try { workletRef.current.disconnect(); } catch (error) {} workletRef.current.port.onmessage = null; workletRef.current = null; }
          if (processorRef.current) { try { processorRef.current.disconnect(); } catch (error) {} processorRef.current.onaudioprocess = null; processorRef.current = null; }
          if (sourceRef.current) { try { sourceRef.current.disconnect(); } catch (error) {} sourceRef.current = null; }
          if (mediaRef.current) { mediaRef.current.getTracks().forEach((track) => track.stop()); mediaRef.current = null; }
          if (inputCtxRef.current) { try { await inputCtxRef.current.close(); } catch (error) {} inputCtxRef.current = null; }
          inputChunksRef.current = [];
          sentChunkCountRef.current = 0;
          setRecording(false);
        }, [logVoice]);

        const closeSocket = React.useCallback(() => {
          logVoice("close websocket");
          if (wsRef.current) {
            wsRef.current.onopen = null;
            wsRef.current.onmessage = null;
            wsRef.current.onerror = null;
            wsRef.current.onclose = null;
            if (wsRef.current.readyState === WebSocket.OPEN || wsRef.current.readyState === WebSocket.CONNECTING) wsRef.current.close();
          }
          wsRef.current = null;
          setActive(false);
        }, [logVoice]);

        const stopConversation = React.useCallback(async (preserveError = false) => {
          logVoice(`stop conversation preserveError=${preserveError}`);
          stoppingRef.current = true;
          await cleanupRecording();
          await cleanupPlayback();
          closeSocket();
          setActive(false);
          setVoiceState("idle");
          if (!preserveError) setErrorText("");
          stoppingRef.current = false;
        }, [cleanupPlayback, cleanupRecording, closeSocket, logVoice]);

        React.useEffect(() => () => { stopConversation(true); }, [stopConversation]);

        const flushInput = React.useCallback(() => {
          const ws = wsRef.current;
          const ctx = inputCtxRef.current;
          if (!ws || ws.readyState !== WebSocket.OPEN || !ctx || !inputChunksRef.current.length) return;
          const total = inputChunksRef.current.reduce((sum, chunk) => sum + chunk.length, 0);
          const merged = new Float32Array(total);
          let offset = 0;
          for (const chunk of inputChunksRef.current) { merged.set(chunk, offset); offset += chunk.length; }
          inputChunksRef.current = [];
          const downsampled = downsampleFloat32(merged, ctx.sampleRate, INPUT_RATE);
          sentChunkCountRef.current += 1;
          if (sentChunkCountRef.current <= 5 || sentChunkCountRef.current % 20 === 0) {
            logVoice(`send audio chunk #${sentChunkCountRef.current}`, { samples: downsampled.length, bytes: downsampled.length * 2 });
          }
          ws.send(float32ToPcm16Bytes(downsampled));
        }, [logVoice]);

        const playChunk = React.useCallback(async (arrayBuffer) => {
          if (!outputCtxRef.current) {
            const AC = window.AudioContext || window.webkitAudioContext;
            outputCtxRef.current = new AC({ sampleRate: OUTPUT_RATE });
            nextPlaybackRef.current = outputCtxRef.current.currentTime;
            logVoice("created output audio context", { sampleRate: OUTPUT_RATE });
          }
          const ctx = outputCtxRef.current;
          if (ctx.state === "suspended") await ctx.resume();
          const floatData = pcmBytesToFloat32(arrayBuffer);
          const audioBuffer = ctx.createBuffer(1, floatData.length, OUTPUT_RATE);
          audioBuffer.copyToChannel(floatData, 0);
          const source = ctx.createBufferSource();
          source.buffer = audioBuffer;
          source.connect(ctx.destination);
          const startTime = Math.max(ctx.currentTime, nextPlaybackRef.current);
          receivedAudioCountRef.current += 1;
          logVoice(`play audio chunk #${receivedAudioCountRef.current}`, {
            bytes: arrayBuffer.byteLength,
            samples: floatData.length,
            startTime,
            duration: audioBuffer.duration
          });
          source.start(startTime);
          nextPlaybackRef.current = startTime + audioBuffer.duration;
          source.onended = () => {
            if (!stoppingRef.current && nextPlaybackRef.current <= ctx.currentTime + 0.05) {
              setVoiceState(recordingRef.current ? "listening" : activeRef.current ? "ready" : "idle");
            }
          };
        }, [logVoice]);

        const initMic = React.useCallback(async () => {
          logVoice("request microphone");
          const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: INPUT_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
          mediaRef.current = stream;
          const AC = window.AudioContext || window.webkitAudioContext;
          const ctx = new AC();
          inputCtxRef.current = ctx;
          logVoice("created input audio context", { sampleRate: ctx.sampleRate });
          if (ctx.state === "suspended") await ctx.resume();
          const source = ctx.createMediaStreamSource(stream);
          sourceRef.current = source;
          if (ctx.audioWorklet) {
            logVoice("using AudioWorklet for mic capture");
            const code = `class GoalFinderInputProcessor extends AudioWorkletProcessor { process(inputs) { const input = inputs[0]; if (input && input[0] && input[0].length) this.port.postMessage(input[0]); return true; } } registerProcessor("goal-finder-input-processor", GoalFinderInputProcessor);`;
            const blob = new Blob([code], { type: "application/javascript" });
            const url = URL.createObjectURL(blob);
            try { await ctx.audioWorklet.addModule(url); } finally { URL.revokeObjectURL(url); }
            const node = new AudioWorkletNode(ctx, "goal-finder-input-processor");
            node.port.onmessage = (event) => inputChunksRef.current.push(new Float32Array(event.data));
            source.connect(node);
            node.connect(ctx.destination);
            workletRef.current = node;
          } else {
            logVoice("using ScriptProcessor fallback for mic capture");
            const node = ctx.createScriptProcessor(4096, 1, 1);
            node.onaudioprocess = (event) => inputChunksRef.current.push(new Float32Array(event.inputBuffer.getChannelData(0)));
            source.connect(node);
            node.connect(ctx.destination);
            processorRef.current = node;
          }
          intervalRef.current = window.setInterval(flushInput, SEND_MS);
          setRecording(true);
          logVoice("microphone pipeline ready");
        }, [flushInput, logVoice]);

        const endTurn = React.useCallback(async () => {
          const ws = wsRef.current;
          if (!ws || ws.readyState !== WebSocket.OPEN) {
            setErrorText("Voice session is not connected.");
            return;
          }

          logVoice("end turn requested");
          flushInput();
          await cleanupRecording();
          ws.send(JSON.stringify({ type: "end_audio" }));
          setVoiceState("waiting");
          logVoice("sent end_audio control message");
        }, [cleanupRecording, flushInput, logVoice]);

        const startRecordingTurn = React.useCallback(async () => {
          logVoice("start recording turn");
          setErrorText("");
          await initMic();
          setVoiceState("listening");
          logVoice("voice state -> listening");
        }, [initMic, logVoice]);

        const startConversation = React.useCallback(async () => {
          logVoice("start conversation");
          setErrorText("");
          setVoiceState("connecting");
          if (!navigator.mediaDevices?.getUserMedia) {
            setVoiceState("idle");
            setErrorText("Microphone capture is not supported in this browser.");
            return;
          }
          const ws = new WebSocket(VOICE_WS_URL(userId));
          ws.binaryType = "arraybuffer";
          wsRef.current = ws;
          ws.onopen = async () => {
            logVoice("voice websocket open");
            try {
              setActive(true);
              await startRecordingTurn();
            } catch (error) {
              logVoice("microphone init failed", error);
              setErrorText(error?.name === "NotAllowedError" ? "Microphone permission denied. Allow mic access and try again." : "Could not access the microphone. Check your input device and browser permissions.");
              setVoiceState("idle");
              await stopConversation(true);
            }
          };
          ws.onmessage = async (event) => {
            if (event.data instanceof ArrayBuffer) {
              logVoice("received binary audio frame", { bytes: event.data.byteLength });
              setVoiceState("speaking");
              await playChunk(event.data);
              return;
            }

            if (typeof event.data === "string") {
              logVoice("received text frame", event.data);
              try {
                const payload = JSON.parse(event.data);
                if (payload.type === "goal_complete" && payload.goal) {
                  logVoice("goal_complete received", payload.goal);
                  await stopConversation(true);
                  onGoalComplete({ goal: payload.goal, roadmap: payload.roadmap });
                  return;
                }
                if (payload.type === "message" && payload.text) {
                  setErrorText(payload.text);
                  if (!recordingRef.current) {
                    setVoiceState("ready");
                  }
                }
              } catch (error) {
                setErrorText("Received an invalid text frame from the voice endpoint.");
              }
              return;
            }

            logVoice("received unsupported frame type", event.data);
            setErrorText("Received an unsupported WebSocket frame type from the voice endpoint.");
          };
          ws.onerror = () => {
            logVoice("voice websocket error");
            setErrorText("Voice WebSocket connection failed. Make sure the backend is running on port 8000.");
            setVoiceState("idle");
            setActive(false);
          };
          ws.onclose = () => {
            logVoice("voice websocket closed");
            setActive(false);
            setRecording(false);
            if (!stoppingRef.current) setVoiceState("idle");
          };
        }, [logVoice, onGoalComplete, playChunk, startRecordingTurn, stopConversation]);

        const toggleConversation = async () => {
          if (voiceState === "connecting" || active) {
            await stopConversation(true);
            return;
          }
          await startConversation();
        };

        const title = {
          idle: "Click to start conversation",
          connecting: "Connecting...",
          listening: "Listening...",
          waiting: "Waiting for Gemini...",
          speaking: "Gemini is speaking...",
          ready: "Your turn again"
        }[voiceState] || "Click to start conversation";
        const copy = {
          idle: "Your microphone audio will stream to Gemini Live in real time and the spoken response will play back through the browser.",
          connecting: "Opening the socket, requesting microphone permission, and preparing the audio pipeline.",
          listening: "Speak naturally. Audio is being captured, downsampled to PCM16, and streamed to the backend.",
          waiting: "Your mic is paused and Gemini has been told your turn is complete. Waiting for a response.",
          speaking: "Raw PCM audio from Gemini is being queued and played through the Web Audio API."
          ,
          ready: "Gemini finished speaking. Start another turn if you need to answer a follow-up question."
        }[voiceState];
        const orbClass = voiceState === "listening" ? "orb listening" : voiceState === "speaking" ? "orb speaking" : "orb";

        return (
          <section className="panel voice">
            <h2>Voice Conversation</h2>
            <p className="subtitle">Use the mic for a live coaching flow. This demo streams raw PCM up, and plays Gemini audio back down.</p>
            <div className="voice-card">
              <div className={orbClass}><div>{voiceState === "speaking" ? "Audio" : "Voice"}</div></div>
              <h3>{title}</h3>
              <p>{copy}</p>
            </div>
            {errorText ? <div className="box-error">{errorText}</div> : null}
            <div style={{ marginTop: 18 }}>
              {!active ? (
                <button className="voice-btn" onClick={startConversation}>
                  Start Conversation
                </button>
              ) : recording ? (
                <button className="voice-btn" onClick={endTurn}>
                  Let Gemini Respond
                </button>
              ) : voiceState === "speaking" || voiceState === "waiting" ? (
                <button className="voice-btn stop" onClick={() => stopConversation()}>
                  End Session
                </button>
              ) : (
                <button className="voice-btn" onClick={startRecordingTurn}>
                  Speak Again
                </button>
              )}
            </div>
            <div style={{ marginTop: 12 }}>
              {active ? (
                <button className="voice-btn stop" onClick={() => stopConversation()}>
                  End Session
                </button>
              ) : null}
            </div>
            <div className="meta">
              <span>Mic input: PCM 16kHz mono in 250ms chunks</span>
              <span>{recording ? "User turn active" : active ? "Waiting on Gemini or next turn" : "Session inactive"}</span>
            </div>
            {errorText ? <div style={{ marginTop: 18 }}><button className="retry" onClick={startConversation}>Retry Voice Mode</button></div> : null}
          </section>
        );
      }

      function App() {
        const [userId, setUserId] = React.useState(null);
        const [mode, setMode] = React.useState("text");
        const [result, setResult] = React.useState(null);

        if (!userId) {
          return <main className="app"><UserIdScreen onConfirm={setUserId} /></main>;
        }

        return (
          <main className="app">
            <header>
              <span className="eyebrow">Goal Extraction Demo</span>
              <h1>{result ? "Your Course" : mode === "text" ? "Text Mode" : "Voice Mode"}</h1>
              {!result ? (
                <>
                  <div className="toggle">
                    <button className={`tab ${mode === "text" ? "active" : ""}`} onClick={() => setMode("text")}>Text</button>
                    <button className={`tab ${mode === "voice" ? "active" : ""}`} onClick={() => setMode("voice")}>Voice</button>
                  </div>
                  <p style={{ marginTop: 8, fontSize: ".85rem", color: "var(--muted)" }}>Signed in as <strong>{userId}</strong></p>
                </>
              ) : null}
            </header>
            {result
              ? <CourseView goal={result.goal} roadmap={result.roadmap} userId={userId} />
              : mode === "text"
                ? <TextMode onGoalComplete={setResult} userId={userId} />
                : <VoiceMode onGoalComplete={setResult} userId={userId} />}
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
